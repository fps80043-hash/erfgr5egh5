services:
  - type: web
    name: roblox-seller-tool-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Optional: set this in Render dashboard (Secrets)
      # - key: GROQ_API_KEY
      #   sync: false
