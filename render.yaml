services:
  - type: web
    name: rbx-store
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    disk:
      name: rbx-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CRYPTOPAY_TOKEN
        sync: false
      - key: DB_PATH
        value: /data/data.db
