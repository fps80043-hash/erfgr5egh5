<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101528"/>
      <stop offset="1" stop-color="#0a1022"/>
    </linearGradient>
    <radialGradient id="glow" cx="62%" cy="48%" r="62%">
      <stop offset="0" stop-color="#29d8ff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#29d8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7a5cff"/>
      <stop offset="1" stop-color="#29d8ff"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="34" fill="url(#bg)"/>
  <circle cx="840" cy="150" r="190" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Title block -->
  <g transform="translate(56,72)" fill="#fff">
    <text x="0" y="0" font-size="58" font-weight="800" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto">Captcha Case</text>
    <text x="0" y="46" font-size="26" opacity="0.78" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto">
      Open once every 48 hours. Bonuses and Premium drops.
    </text>

    <g transform="translate(0,86)">
      <rect x="0" y="0" rx="16" width="120" height="44" fill="rgba(41,216,255,0.16)" stroke="rgba(255,255,255,0.18)"/>
      <text x="22" y="30" font-size="22" font-weight="800" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto">FREE</text>
    </g>
  </g>

  <!-- Icon -->
  <g transform="translate(900,74)">
    <rect x="40" y="50" width="220" height="220" rx="42" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
    <path d="M130 82c0-28 22-50 50-50s50 22 50 50" fill="none" stroke="url(#pill)" stroke-width="12" stroke-linecap="round"/>
    <rect x="110" y="126" width="140" height="144" rx="28" fill="none" stroke="url(#pill)" stroke-width="12"/>
    <circle cx="180" cy="198" r="10" fill="#fff" opacity="0.85"/>
    <path d="M170 210h20" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- subtle lines -->
  <g opacity="0.10">
    <path d="M0 100H1200M0 200H1200" stroke="#fff"/>
    <path d="M260 0V360M520 0V360M780 0V360M1040 0V360" stroke="#fff"/>
  </g>
</svg>
