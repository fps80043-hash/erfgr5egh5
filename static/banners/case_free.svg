<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b10"/>
      <stop offset="1" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <circle cx="220" cy="120" r="220" fill="#7c5cff" opacity="0.22" filter="url(#blur)"/>
  <circle cx="980" cy="140" r="240" fill="#22d3ee" opacity="0.14" filter="url(#blur)"/>
  <circle cx="760" cy="540" r="320" fill="#ffffff" opacity="0.05" filter="url(#blur)"/>
  <g opacity="0.15" stroke="#ffffff" stroke-width="1">
    <path d="M60 420 L220 320 L360 380 L540 260 L720 300 L860 220 L1140 280" fill="none"/>
    <circle cx="220" cy="320" r="4" fill="#ffffff"/>
    <circle cx="360" cy="380" r="4" fill="#ffffff"/>
    <circle cx="540" cy="260" r="4" fill="#ffffff"/>
    <circle cx="720" cy="300" r="4" fill="#ffffff"/>
    <circle cx="860" cy="220" r="4" fill="#ffffff"/>
  </g>

  <!-- gift icon -->
  <g transform="translate(770 130)" fill="none" stroke="url(#a)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <rect x="0" y="130" width="260" height="220" rx="38"/>
    <path d="M0 210 H260"/>
    <path d="M130 130 V350"/>
    <path d="M80 110 C80 70 120 70 130 100 C140 70 180 70 180 110"/>
  </g>

  <g font-family="system-ui, -apple-system, Segoe UI, Roboto" fill="#ffffff">
    <text x="80" y="240" font-size="64" font-weight="800" letter-spacing="0.5">Captcha Case</text>
    <text x="80" y="300" font-size="28" opacity="0.75">Open once every 48 hours. Bonuses and Premium drops.</text>
    <rect x="80" y="340" width="210" height="56" rx="18" fill="url(#a)" opacity="0.35"/>
    <text x="110" y="378" font-size="26" font-weight="800">FREE</text>
  </g>
</svg>
