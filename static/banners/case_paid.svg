<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12162a"/>
      <stop offset="1" stop-color="#0b0f1f"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="60%">
      <stop offset="0" stop-color="#5b6bff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5b6bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a5cff"/>
      <stop offset="1" stop-color="#29d8ff"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="34" fill="url(#bg)"/>
  <circle cx="860" cy="120" r="170" fill="url(#glow)" filter="url(#blur)"/>

  <!-- subtle grid -->
  <g opacity="0.10">
    <path d="M0 90H1200M0 180H1200M0 270H1200" stroke="#fff"/>
    <path d="M150 0V360M300 0V360M450 0V360M600 0V360M750 0V360M900 0V360M1050 0V360" stroke="#fff"/>
  </g>

  <!-- Title block -->
  <g transform="translate(56,72)" fill="#fff">
    <text x="0" y="0" font-size="58" font-weight="800" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto">PAID CASE</text>
    <text x="0" y="46" font-size="26" opacity="0.78" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto">
      No captcha. Fast open for balance. Drops go to inventory.
    </text>

    <g transform="translate(0,86)">
      <rect x="0" y="0" rx="16" width="180" height="44" fill="rgba(122,92,255,0.22)" stroke="rgba(255,255,255,0.18)"/>
      <text x="22" y="30" font-size="22" font-weight="700" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto">INSTANT</text>
    </g>
  </g>

  <!-- Price badge -->
  <g transform="translate(960,70)" filter="url(#shadow)">
    <circle cx="140" cy="110" r="92" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
    <circle cx="140" cy="110" r="78" fill="none" stroke="url(#ring)" stroke-width="10" stroke-linecap="round"/>
    <text x="140" y="118" text-anchor="middle" font-size="54" font-weight="900" fill="#fff"
          font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto">₽17</text>
    <text x="140" y="154" text-anchor="middle" font-size="16" opacity="0.7" fill="#fff"
          font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto">starting at</text>
  </g>

  <!-- corner highlight -->
  <path d="M36 40c120-40 280-40 360 0" stroke="rgba(255,255,255,0.12)" stroke-width="2" fill="none"/>
</svg>
