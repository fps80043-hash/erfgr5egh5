<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b10"/>
      <stop offset="1" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <circle cx="930" cy="150" r="220" fill="#22d3ee" opacity="0.14" filter="url(#blur)"/>
  <circle cx="350" cy="120" r="240" fill="#7c5cff" opacity="0.12" filter="url(#blur)"/>

  <g fill="none" stroke="#ffffff" opacity="0.08">
    <path d="M40 520 H1160"/>
    <path d="M80 70 H1120"/>
    <path d="M120 140 H1080"/>
  </g>

  <!-- Coin / paid mark -->
  <g transform="translate(780 150)">
    <circle cx="160" cy="160" r="140" fill="#0f1117" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
    <circle cx="160" cy="160" r="110" fill="none" stroke="url(#a)" stroke-width="10" opacity="0.8"/>
    <text x="160" y="175" text-anchor="middle" font-family="Inter, system-ui, -apple-system" font-weight="900" font-size="64" fill="#ffffff">₽17</text>
  </g>

  <g transform="translate(80 150)" font-family="Inter, system-ui, -apple-system" fill="#ffffff">
    <text x="0" y="90" font-size="82" font-weight="900" letter-spacing="0.5">PAID CASE</text>
    <text x="0" y="150" font-size="30" opacity="0.82">No captcha. Fast open for balance. Drops go to inventory.</text>
    <rect x="0" y="195" width="260" height="60" rx="18" fill="url(#a)" opacity="0.35"/>
    <text x="28" y="236" font-size="26" font-weight="800">INSTANT</text>
  </g>
</svg>
